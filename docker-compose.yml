services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api
    image: ghcr.io/jbolonski/poollog-frontend:latest
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - default

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: ghcr.io/jbolonski/poollog-backend:latest
    environment:
      PORT: 3001
      POOLLOG_DATA_PATH: /data/entries.json
    ports:
      - "3001:3001"
    networks:
      - default
    volumes:
      - poollog-data:/data

volumes:
  poollog-data:

networks:
  default:
    name: poollog_default
