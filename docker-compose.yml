services:
  frontend:
    image: ghcr.io/jbolonski/poollog-frontend:latest
    pull_policy: always
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - default

  backend:
    image: ghcr.io/jbolonski/poollog-backend:latest
    pull_policy: always
    environment:
      PORT: 3001
      POOLLOG_DATA_PATH: /data/entries.json
    ports:
      - "3001:3001"
    networks:
      - default
    volumes:
      - poollog-data:/data

volumes:
  poollog-data:

networks:
  default:
    name: poollog_default
